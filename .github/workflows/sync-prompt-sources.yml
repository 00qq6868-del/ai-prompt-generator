name: Sync Prompt Sources

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: sync-prompt-sources
  cancel-in-progress: false

jobs:
  prompt-sources:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Sync upstream prompt sources
        run: npm run sources:all
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Commit source status changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/gpt-image-2-source-status.ts src/lib/prompt-source-library-status.ts
          if git diff --cached --quiet; then
            echo "No prompt source changes."
            exit 0
          fi
          git commit -m "chore: sync prompt sources"
          git pull --rebase origin main
          git push origin HEAD:main
