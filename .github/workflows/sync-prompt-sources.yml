name: Sync Prompt Sources

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: sync-prompt-sources
  cancel-in-progress: false

jobs:
  gpt-image-2:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Sync GPT Image 2 upstream sources
        run: npm run sources:gpt-image2

      - name: Commit source status changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/gpt-image-2-source-status.ts
          if git diff --cached --quiet; then
            echo "No GPT Image 2 source changes."
            exit 0
          fi
          git commit -m "chore: sync GPT Image 2 sources"
          git pull --rebase origin main
          git push origin HEAD:main
