name: Prompt Data Sync Validation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  validate-data-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Sync external prompt sources read-only
        run: npm run sources:all
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Validate feedback JSONL
        run: npm run data:validate

      - name: Type check
        run: npm run typecheck

      - name: Run V3 unit and comparison tests
        run: |
          npm test
          npm run comparison:validate
          npm run quality:golden
          npm run schema:validate

      - name: Build
        run: npm run build

      - name: Run V3 HTTP smoke
        run: npm run smoke:http

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: V3 browser smoke
        run: npm run e2e:playwright
