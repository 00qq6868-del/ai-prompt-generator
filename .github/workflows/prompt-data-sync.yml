name: Prompt Data Sync Validation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  validate-data-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Sync external prompt sources read-only
        run: npm run sources:all
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Validate feedback JSONL
        run: npm run data:validate

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E
        run: npx playwright test --project=chromium
        env:
          HOSTNAME: 127.0.0.1
          PORT: 3000
          PLAYWRIGHT_WEB_SERVER_COMMAND: npm run start:e2e
