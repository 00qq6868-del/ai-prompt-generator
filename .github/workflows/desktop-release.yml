name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example desktop-v1.0.0
        required: false
        type: string

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run electron:build
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: Resolve release tag
        id: release
        shell: pwsh
        run: |
          $tag = "${{ inputs.tag }}"
          if (-not $tag) {
            $version = node -p "require('./package.json').version"
            $tag = "desktop-v$version"
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Create or update GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          gh release view $env:TAG 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:TAG --title "AI 提示词生成器 $env:TAG" --notes "Windows desktop installer."
          }
          $releaseJson = gh release view $env:TAG --json assets
          $release = $releaseJson | ConvertFrom-Json
          foreach ($asset in $release.assets) {
            if ($asset.name -like "*.exe" -or $asset.name -like "*.blockmap") {
              gh release delete-asset $env:TAG $asset.name -y
            }
          }
          gh release upload $env:TAG "dist-electron\*.exe" --clobber
          gh release upload $env:TAG "dist-electron\*.blockmap" --clobber

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-installer
          path: |
            dist-electron/*.exe
            dist-electron/*.blockmap
          retention-days: 14

  mac:
    runs-on: macos-latest
    timeout-minutes: 45
    needs: windows

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS app
        run: npm run electron:build:mac
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          tag="${{ inputs.tag }}"
          if [ -z "$tag" ]; then
            version=$(node -p "require('./package.json').version")
            tag="desktop-v$version"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "AI 提示词生成器 $TAG" --notes "Desktop releases."
          for asset in $(gh release view "$TAG" --json assets --jq '.assets[].name'); do
            case "$asset" in
              *.dmg|*.zip)
                gh release delete-asset "$TAG" "$asset" -y || true
                ;;
            esac
          done
          gh release upload "$TAG" dist-electron/*.dmg --clobber
          if ls dist-electron/*.zip >/dev/null 2>&1; then
            gh release upload "$TAG" dist-electron/*.zip --clobber
          fi

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-desktop
          path: |
            dist-electron/*.dmg
            dist-electron/*.zip
          retention-days: 14

  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: windows

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Linux AppImage
        run: npm run electron:build:linux
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          tag="${{ inputs.tag }}"
          if [ -z "$tag" ]; then
            version=$(node -p "require('./package.json').version")
            tag="desktop-v$version"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "AI 提示词生成器 $TAG" --notes "Desktop releases."
          for asset in $(gh release view "$TAG" --json assets --jq '.assets[].name'); do
            case "$asset" in
              *.AppImage)
                gh release delete-asset "$TAG" "$asset" -y || true
                ;;
            esac
          done
          gh release upload "$TAG" dist-electron/*.AppImage --clobber

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-desktop
          path: dist-electron/*.AppImage
          retention-days: 14
