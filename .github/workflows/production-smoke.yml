name: Production Smoke Test

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Run production smoke test
        run: node scripts/production-smoke.cjs
        env:
          PRODUCTION_BASE_URL: https://www.myprompt.asia
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || secrets.GROQ }}
          AIHUBMIX_API_KEY: ${{ secrets.AIHUBMIX_API_KEY }}
          CUSTOM_BASE_URL: https://aihubmix.com/v1
