# .github/workflows/update-models.yml
# 自动更新 public/models.json
# 每天 UTC 02:00（北京时间 10:00）自动运行，检测最新模型并提交

name: Auto Update Models

on:
  schedule:
    - cron: "17 */2 * * *"  # 每2小时检查一次
  workflow_dispatch:          # 支持手动触发

jobs:
  update-models:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # 允许 commit & push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run model scraper
        run: node .github/scripts/fetch-models.mjs
        env:
          AIHUBMIX_API_KEY:  ${{ secrets.AIHUBMIX_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY:    ${{ secrets.GOOGLE_API_KEY }}
          DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY }}
          XAI_API_KEY:       ${{ secrets.XAI_API_KEY }}
          MISTRAL_API_KEY:   ${{ secrets.MISTRAL_API_KEY }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet public/models.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate system state
        if: steps.diff.outputs.changed == 'true'
        run: |
          node -e "
          const fs = require('fs');
          const m = JSON.parse(fs.readFileSync('public/models.json','utf8'));
          const cats = {};
          m.forEach(x => { const c = x.category||'text'; cats[c]=(cats[c]||0)+1; });
          const zc = m.filter(x => x.inputCostPer1M===0 && x.outputCostPer1M===0).length;
          const state = {
            updatedAt: new Date().toISOString(),
            totalModels: m.length,
            byCategory: cats,
            zeroCostModels: zc,
            metaCoverage: m.length - zc
          };
          fs.mkdirSync('context', {recursive:true});
          fs.writeFileSync('context/SYSTEM_STATE.json', JSON.stringify(state, null, 2));
          "

      - name: Commit & push if changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/models.json context/SYSTEM_STATE.json
          git commit -m "chore: auto-update models $(date +'%Y-%m-%d')"
          git push
