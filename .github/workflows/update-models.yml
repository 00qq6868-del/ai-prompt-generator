# .github/workflows/update-models.yml
# 自动更新 public/models.json
# 每天 UTC 02:00（北京时间 10:00）自动运行，检测最新模型并提交

name: Auto Update Models

on:
  schedule:
    - cron: "0 2 * * *"   # 每天北京时间 10:00
  workflow_dispatch:        # 支持手动触发

jobs:
  update-models:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # 允许 commit & push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run model scraper
        run: node .github/scripts/fetch-models.mjs
        env:
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY:    ${{ secrets.GOOGLE_API_KEY }}

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet public/models.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit & push if changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/models.json
          git commit -m "chore: auto-update models $(date +'%Y-%m-%d')"
          git push
