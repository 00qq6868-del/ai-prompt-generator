# .github/workflows/update-models.yml
# 自动更新 public/models.json
# 每2小时自动运行，检测最新模型并提交

name: Auto Update Models

on:
  schedule:
    - cron: "17 */2 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-models:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run model scraper
        id: scraper
        run: node .github/scripts/fetch-models.mjs
        continue-on-error: true
        env:
          AIHUBMIX_API_KEY:  ${{ secrets.AIHUBMIX_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY:    ${{ secrets.GOOGLE_API_KEY }}
          DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY }}
          XAI_API_KEY:       ${{ secrets.XAI_API_KEY }}
          MISTRAL_API_KEY:   ${{ secrets.MISTRAL_API_KEY }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}

      - name: Check scraper health
        if: steps.scraper.outcome == 'failure'
        run: |
          echo "🚨 Model scraper failed — possible health check abort or API errors"
          echo "scraper_failed=true" >> $GITHUB_ENV

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet public/models.json context/SYSTEM_STATE.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Read change stats
        id: stats
        if: steps.diff.outputs.changed == 'true'
        run: |
          if [ -f context/SYSTEM_STATE.json ]; then
            ADDED=$(node -e "const s=JSON.parse(require('fs').readFileSync('context/SYSTEM_STATE.json','utf8'));console.log(s.lastUpdate?.added??0)")
            TOTAL=$(node -e "const s=JSON.parse(require('fs').readFileSync('context/SYSTEM_STATE.json','utf8'));console.log(s.totalModels??0)")
            echo "added=$ADDED" >> $GITHUB_OUTPUT
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
          else
            echo "added=0" >> $GITHUB_OUTPUT
            echo "total=0" >> $GITHUB_OUTPUT
          fi

      - name: Commit & push if changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/models.json context/SYSTEM_STATE.json
          git commit -m "chore: auto-update models $(date +'%Y-%m-%d')"
          git push

      - name: Create notification issue (≥5 new models)
        if: steps.diff.outputs.changed == 'true' && steps.stats.outputs.added >= 5
        uses: actions/github-script@v7
        with:
          script: |
            const added = ${{ steps.stats.outputs.added }};
            const total = ${{ steps.stats.outputs.total }};
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🤖 模型更新: +${added} 个新模型 (共 ${total})`,
              body: `## 模型自动更新通知\n\n- **新增模型**: ${added} 个\n- **总模型数**: ${total}\n- **更新时间**: ${new Date().toISOString()}\n\n请检查 \`public/models.json\` 和 \`context/SYSTEM_STATE.json\` 确认变更。\n\n---\n🤖 Auto-generated by model update workflow`,
              labels: ['models-update']
            });

      - name: Create alert issue (health check failed)
        if: env.scraper_failed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 模型更新健康检查失败',
              body: `## 模型更新警报\n\n模型抓取脚本失败，可能原因：\n- 模型数量下降超过 20%（健康检查中止）\n- 所有 API 源均返回错误\n\n请检查 [workflow 日志](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}) 排查问题。\n\n---\n🤖 Auto-generated by model update workflow`,
              labels: ['models-update', 'alert']
            });
