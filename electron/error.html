<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>启动失败</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #060610; color: #fff;
    font-family: "Microsoft YaHei", sans-serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100vh; gap: 16px; padding: 40px;
    text-align: center;
  }
  .icon { font-size: 48px; }
  h2 { font-size: 18px; color: #f87171; }
  p  { font-size: 13px; color: rgba(255,255,255,0.5); line-height: 1.7; }
</style>
</head>
<body>
  <div class="icon">⚠️</div>
  <h2>服务器启动失败</h2>
  <p>内部服务器未能在规定时间内启动。<br>请关闭 App 重新打开，或运行 setup.bat 重新构建。</p>
</body>
</html>
